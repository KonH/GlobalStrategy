name: Handle Feature Issue

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  handle:
    if: |
      (github.event_name == 'issues' && github.event.issue.user.login == 'KonH') ||
      (github.event_name == 'issue_comment' && github.event.comment.user.login == 'KonH' && github.event.issue.pull_request != null)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: "/handle-feature-issue"
          claude_args: "--max-turns 30"
