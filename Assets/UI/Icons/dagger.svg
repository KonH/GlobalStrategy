<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#FFFFFF" viewBox="0 0 16 16">
  <!-- Dagger — cloak-and-dagger secret -->
  <!-- Blade: tapered triangle, tip at top -->
  <polygon points="8,1 9.5,9 6.5,9"/>
  <!-- Crossguard (horizontal bar) -->
  <rect x="4.5" y="9" width="7" height="2" rx="0.8"/>
  <!-- Grip/handle (wrapped, narrower) -->
  <rect x="7" y="10.5" width="2" height="3.5" rx="0.3"/>
  <!-- Pommel (round end) -->
  <circle cx="8" cy="14.5" r="1.3"/>
  <!-- Blood drop beside blade (secret / sinister) -->
  <path d="M11 5.5 Q12.5 7 11.5 8.5 Q10.5 7 11 5.5z"/>
</svg>
