<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#FFFFFF" viewBox="0 0 16 16">
  <!-- Compass rose — 4 cardinal arrows for "discover/explore" -->
  <!-- North point (tall, bold) -->
  <polygon points="8,1 6,6 10,6"/>
  <!-- South point -->
  <polygon points="8,15 6,10 10,10"/>
  <!-- East point -->
  <polygon points="15,8 10,6 10,10"/>
  <!-- West point -->
  <polygon points="1,8 6,6 6,10"/>
  <!-- Cross connecting shafts -->
  <rect x="7" y="6" width="2" height="4"/>
  <rect x="6" y="7" width="4" height="2"/>
  <!-- Outer ring of compass -->
  <path fill-rule="evenodd" d="M8 2a6 6 0 100 12A6 6 0 008 2zm0 1a5 5 0 110 10A5 5 0 018 3z"/>
</svg>
