<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Chess pawn — strategic control of a country -->
  <!-- Head -->
  <circle cx="8" cy="3.4" r="1.9" fill="#FFFFFF"/>
  <!-- Neck -->
  <rect x="6.9" y="5" width="2.2" height="1.1" fill="#FFFFFF"/>
  <!-- Body -->
  <polygon points="6.9,6.1 9.1,6.1 10.3,11.5 5.7,11.5" fill="#FFFFFF"/>
  <!-- Base plinth -->
  <rect x="4.5" y="11.5" width="7" height="1.4" fill="#FFFFFF"/>
  <rect x="3.5" y="13.2" width="9" height="1.4" fill="#FFFFFF"/>
</svg>
