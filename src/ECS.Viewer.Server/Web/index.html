<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ECS Viewer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: monospace; font-size: 13px; background: #1e1e1e; color: #d4d4d4; display: flex; flex-direction: column; height: 100vh; }
#toolbar { padding: 8px 12px; background: #252526; border-bottom: 1px solid #3c3c3c; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
#toolbar h1 { font-size: 14px; color: #9cdcfe; margin-right: 8px; }
#pauseBtn { padding: 4px 10px; background: #0e639c; color: #fff; border: none; cursor: pointer; border-radius: 3px; }
#pauseBtn.paused { background: #6a9955; }
#filterRow { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; padding: 6px 12px; background: #252526; border-bottom: 1px solid #3c3c3c; }
#filterRow label { font-size: 11px; color: #9cdcfe; }
.filter-chip { display: flex; gap: 2px; align-items: center; }
.filter-chip span { font-size: 11px; color: #d4d4d4; padding: 2px 5px; background: #333; border-radius: 3px; }
.filter-btn { width: 18px; height: 18px; border: none; cursor: pointer; border-radius: 2px; font-size: 11px; display: flex; align-items: center; justify-content: center; }
.filter-btn.require { background: #2d7a2d; color: #fff; }
.filter-btn.require.active { background: #4ec94e; color: #000; }
.filter-btn.exclude { background: #7a2d2d; color: #fff; }
.filter-btn.exclude.active { background: #e05353; color: #fff; }
#main { display: flex; flex: 1; overflow: hidden; }
#entityList { width: 320px; min-width: 200px; overflow-y: auto; border-right: 1px solid #3c3c3c; }
.entity-row { padding: 5px 10px; cursor: pointer; border-bottom: 1px solid #2a2a2a; }
.entity-row:hover { background: #2a2d2e; }
.entity-row.selected { background: #094771; }
.entity-id { color: #9cdcfe; }
.comp-tags { color: #6a9955; font-size: 11px; }
#detail { flex: 1; overflow-y: auto; padding: 12px; }
#detail h2 { color: #9cdcfe; margin-bottom: 10px; font-size: 13px; }
.comp-block { margin-bottom: 14px; }
.comp-name { color: #4ec9b0; margin-bottom: 4px; font-weight: bold; }
.field-row { display: flex; align-items: center; gap: 8px; padding: 2px 0; }
.field-name { color: #9cdcfe; min-width: 140px; }
.field-value { color: #ce9178; }
.field-value input { background: #3c3c3c; color: #ce9178; border: 1px solid #555; padding: 1px 4px; font-family: monospace; font-size: 12px; width: 160px; }
.field-value input:focus { outline: 1px solid #0e639c; border-color: #0e639c; }
.entity-link { color: #569cd6; text-decoration: underline; cursor: pointer; }
#status { padding: 3px 12px; font-size: 11px; color: #808080; background: #252526; border-top: 1px solid #3c3c3c; }
</style>
</head>
<body>
<div id="toolbar">
  <h1>ECS Viewer</h1>
  <button id="pauseBtn">Pause</button>
  <span id="entityCount" style="color:#808080"></span>
</div>
<div id="filterRow"><label>Filter:</label></div>
<div id="main">
  <div id="entityList"></div>
  <div id="detail"><p style="color:#555">Select an entity</p></div>
</div>
<div id="status">connecting…</div>
<script src="app.js"></script>
</body>
</html>
